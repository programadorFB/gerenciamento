services:
  gerenciamento_banca_frontend:
    build:
      context: ./frontend/
      args:
        VITE_API_URL: "https://gerenciamento_api_vps.sortehub.online"
    container_name: gerenciamento_banca_frontend
    restart: unless-stopped
    ports:
      - "84:84"
    networks:
      - rede_externa

  gerenciamento_banca_backend:
    build:
      context: ./backend/
    container_name: gerenciamento_banca_backend
    restart: unless-stopped
    ports:
      - "5004:5004"
    networks:
      - rede_externa
      
  cloudflared:
    container_name: gerenciamento_tunnel
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiOGQ2YTZmYWY4YzMwM2EzNDU2YzNlZDUwMGYzNjBlNDciLCJ0IjoiYzYwMTUzMTYtNmIzNC00MzE5LThlNzEtNTZlZjQ1MjdmZjBhIiwicyI6Ik9EQTJabUZqTVdZdE4yTmxOQzAwT0dZNUxUazJPR1F0TWpSaU5EaGxPR1EzTWpFdyJ9
    restart: unless-stopped
    networks:
      - rede_externa

networks:
  rede_externa:
    external: true
    name: rede_externa