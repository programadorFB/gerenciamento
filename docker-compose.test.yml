services:
  # Testes do backend Python
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "pip install pytest pytest-cov &&
             python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing"
    environment:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite://
    depends_on: []

  # Testes do frontend React
  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: npx vitest run --reporter=verbose
